body{

 #abrirConvite{

<body>
  

<div class="container">

<img id="pagina" src="imagens/IMG_4212.png" onclick="clicarPagina(event)">
    
<p id="contador">Página 1 de 10</p>
<div class="botoes">
<button onclick="anterior()">⬅ Anterior</button>
<button onclick="proxima()">Próxima ➡</button>
</div>
<a id="presentes"
href="#"
target="_blank">
🎁 Ver Lista de Presentes
</a>
</div>
  
    
    <script>

const paginas = [
"imagens/IMG_4212.png",
"imagens/IMG_4253.png",
"imagens/IMG_4255.png",
"imagens/IMG_4266.png",
"imagens/IMG_4256.png",
"imagens/IMG_4257.png",
"imagens/IMG_4258.png",
"imagens/IMG_4259.png",
"imagens/IMG_4260.png",
"imagens/IMG_4261.png"
];

let atual = 0;

function mostrarPagina(){

    const img = document.getElementById("pagina");

    img.style.opacity = 0;

    setTimeout(() => {

        img.src = paginas[atual];

        document.getElementById("contador").innerText =
        "Página " + (atual + 1) + " de " + paginas.length;

        img.style.opacity = 1;

    }, 75);
} 
    

function proxima(){
if(atual < paginas.length - 1){
atual++;
mostrarPagina();
}
}

function anterior(){
if(atual > 0){
atual--;
mostrarPagina();
}
}
  function abrirConvite(){
    atual = 1;
    mostrarPagina();
}  
   function clicarPagina(event){

    const img = document.getElementById("pagina");
    const rect = img.getBoundingClientRect();

    const x = event.clientX - rect.left;
    const y = event.clientY - rect.top;

    const largura = rect.width;
    const altura = rect.height;

    // CAPA
    if(atual === 0){

        if(
            x > largura * 0.35 &&
            x < largura * 0.65 &&
            y > altura * 0.78 &&
            y < altura * 0.95
        ){
            atual = 1;
            mostrarPagina();
        }

        return;
    }

    // LISTA DE PRESENTES (página 7)
    if(atual === 6){

        if(
            x > largura * 0.25 &&
            x < largura * 0.75 &&
            y > altura * 0.64 &&
            y < altura * 0.78
        ){
            window.open("COLE_AQUI_O_LINK_DA_LISTA", "_blank");
        }

        return;
    }

    // CONFIRMAÇÃO (página 8)
    if(atual === 7){

        if(
            x > largura * 0.25 &&
            x < largura * 0.75 &&
            y > altura * 0.60 &&
            y < altura * 0.76
        ){
            window.open(
                "https://wa.me/5514996715109?text=Olá!%20Gostaria%20de%20confirmar%20minha%20presença%20no%20casamento.",
                "_blank"
            );
        }

        return;
    }
}
    

   


mostrarPagina();
      let touchStartX = 0;
let touchEndX = 0;

document.addEventListener("touchstart", function(e){
    touchStartX = e.changedTouches[0].screenX;
});

document.addEventListener("touchend", function(e){
    touchEndX = e.changedTouches[0].screenX;
    verificarSwipe();
});

function verificarSwipe(){

    if(touchStartX - touchEndX > 50){
        proxima();
    }

    if(touchEndX - touchStartX > 50){
        anterior();
    }

} 
</script>

</body>
</html>
