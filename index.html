<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Guilherme & Flávia</title>

<style>
   #contador{
    font-size:16px;
    color:#0d3b4c;
    margin-top:15px;
    font-weight:bold;
      } 
   #presentes{
    display:none;
    background:#0d3b4c;
    color:white;
    text-decoration:none;
    padding:15px 25px;
    border-radius:40px;
    font-weight:bold;
    margin-bottom:15px;
}
   #rsvp{
    display:none;
    background:#25D366;
    color:white;
    text-decoration:none;
    padding:15px 25px;
    border-radius:40px;
    font-weight:bold;
    margin-bottom:15px;
}
body{
    margin:0;
    background:#f5f1eb;
    font-family:Georgia, serif;
    text-align:center;
} 
 #abrirConvite{
    background:#d4af37;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:40px;
    font-size:18px;
    margin-top:20px;
    cursor:pointer;
    font-weight:bold;
}   

.container{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

img{
    width:100%;
    max-width:800px;
    display:block;
    margin:auto;
}

.botoes{
    padding:20px;
}

button{
    background:#0d3b4c;
    color:white;
    border:none;
    padding:12px 24px;
    margin:10px;
    border-radius:30px;
    font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<img id="pagina" src="imagens/IMG_4212.png" onclick="clicarPagina()">
    
<p id="contador">Página 1 de 10</p>
<div class="botoes">
<button onclick="anterior()">⬅ Anterior</button>
<button onclick="proxima()">Próxima ➡</button>
</div>
<a id="presentes"
href="#"
target="_blank">
🎁 Ver Lista de Presentes
</a>
</div>
   <a id="rsvp"
href="https://wa.me/5514996715109?text=Olá!%20Gostaria%20de%20confirmar%20minha%20presença%20no%20casamento."
target="_blank">
💬 Confirmar Presença
</a>
    
    <script>

const paginas = [
"imagens/IMG_4212.png",
"imagens/IMG_4253.png",
"imagens/IMG_4255.png",
"imagens/IMG_4266.png",
"imagens/IMG_4256.png",
"imagens/IMG_4257.png",
"imagens/IMG_4258.png",
"imagens/IMG_4259.png",
"imagens/IMG_4260.png",
"imagens/IMG_4261.png"
];

let atual = 0;

function mostrarPagina(){

    document.getElementById("pagina").src = paginas[atual];
document.getElementById("contador").innerText =
"Página " + (atual + 1) + " de " + paginas.length;
    
const rsvp = document.getElementById("rsvp");
const presentes = document.getElementById("presentes");

rsvp.style.display = "none";
presentes.style.display = "none";

if(atual === 6){
    presentes.style.display = "inline-block";
}

if(atual === 7){
    rsvp.style.display = "inline-block";
}
    

function proxima(){
if(atual < paginas.length - 1){
atual++;
mostrarPagina();
}
}

function anterior(){
if(atual > 0){
atual--;
mostrarPagina();
}
}
  function abrirConvite(){
    atual = 1;
    mostrarPagina();
}  
   function clicarPagina(){
    if(atual === 0){
        abrirConvite();
    }
}
mostrarPagina();
      let touchStartX = 0;
let touchEndX = 0;

document.addEventListener("touchstart", function(e){
    touchStartX = e.changedTouches[0].screenX;
});

document.addEventListener("touchend", function(e){
    touchEndX = e.changedTouches[0].screenX;
    verificarSwipe();
});

function verificarSwipe(){

    if(touchStartX - touchEndX > 50){
        proxima();
    }

    if(touchEndX - touchStartX > 50){
        anterior();
    }

} 
</script>

</body>
</html>
